apiVersion: v1
kind: Namespace
metadata:
  name: lroux-production
  labels:
    name: lroux-production
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lroux-deployment
  namespace: lroux-production
  labels:
    app: lroux
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lroux
  template:
    metadata:
      labels:
        app: lroux
    spec:
      terminationGracePeriodSeconds: 10
      containers:
        - name: lroux
          image: "ghcr.io/laelian-r/test-docker-mc:latest"
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          resources:
            requests:
              cpu: "128m"
              memory: "256Mi"
            limits:
              cpu: "512m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 60
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: lroux-service
  namespace: lroux-production
  labels:
    app: lroux
spec:
  type: ClusterIP
  selector:
    app: lroux
  ports:
    - name: http
      port: 80
      protocol: TCP
      targetPort: 3000
---
# RESSOURCE
apiVersion: traefik.containo.us/v1alpha1
kind: Middleware
metadata:
  name: strip-prefix
  namespace: lroux-production
spec:
  stripPrefix:
    prefixes:
      - /lroux
---
# SERVICE
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: lroux-ingress
  namespace: lroux-production
  annotations:
    traefik.ingress.kubernetes.io/router.middlewares: lroux-production-strip-prefix@kubernetescrd
spec:
  ingressClassName: traefik
  rules:
    - http:
        paths:
          - path: /lroux
            pathType: Prefix
            backend:
              service:
                name: lroux-service
                port:
                  number: 80
